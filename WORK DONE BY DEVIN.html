<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Poppins',sans-serif;
    background:#020617;
    position:relative;
}

/* FAST RGB BACKGROUND */

.bg{
    position:absolute;
    width:200%;
    height:200%;
    background:
    radial-gradient(circle at 20% 20%, rgba(59,130,246,.35), transparent 30%),
    radial-gradient(circle at 80% 30%, rgba(6,182,212,.35), transparent 30%),
    radial-gradient(circle at 50% 80%, rgba(168,85,247,.30), transparent 30%),
    radial-gradient(circle at 30% 70%, rgba(236,72,153,.28), transparent 30%);
    animation:bgMove 8s linear infinite alternate;
}

@keyframes bgMove{
    0%{
        transform:translate(0,0) rotate(0deg) scale(1);
    }
    100%{
        transform:translate(-4%,-4%) rotate(5deg) scale(1.05);
    }
}

/* GLOW ORBS */

.orb{
    position:absolute;
    border-radius:50%;
    filter:blur(120px);
    opacity:.45;
    animation:float 6s ease-in-out infinite alternate;
}

.orb:nth-child(1){
    width:320px;
    height:320px;
    background:#3b82f6;
    top:-100px;
    left:-80px;
}

.orb:nth-child(2){
    width:260px;
    height:260px;
    background:#06b6d4;
    bottom:-90px;
    right:-60px;
    animation-duration:8s;
}

.orb:nth-child(3){
    width:240px;
    height:240px;
    background:#a855f7;
    top:45%;
    left:65%;
    animation-duration:10s;
}

@keyframes float{
    from{
        transform:translateY(-20px) translateX(0px);
    }
    to{
        transform:translateY(30px) translateX(25px);
    }
}

/* BIG GLASS BOX */

.card{
    position:relative;
    z-index:2;
    width:500px;
    padding:65px 50px;
    border-radius:36px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.12);
    backdrop-filter:blur(25px);
    box-shadow:
    0 15px 50px rgba(0,0,0,.4);
    overflow:hidden;
}

/* RGB BORDER */

.card::before{
    content:"";
    position:absolute;
    inset:-2px;
    border-radius:36px;
    background:linear-gradient(
        90deg,
        #3b82f6,
        #06b6d4,
        #a855f7,
        #ec4899,
        #22c55e,
        #3b82f6
    );
    background-size:400%;
    z-index:-1;
    filter:blur(20px);
    opacity:.9;
    animation:borderGlow 6s linear infinite;
}

@keyframes borderGlow{
    0%{
        background-position:0% 50%;
    }
    100%{
        background-position:400% 50%;
    }
}

/* TITLE */

.title{
    text-align:center;
    font-size:52px;
    font-weight:800;
    letter-spacing:6px;
    background:linear-gradient(
        90deg,
        #60a5fa,
        #22d3ee,
        #c084fc,
        #f472b6
    );
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* SUBTITLE */

.subtitle{
    margin-top:18px;
    text-align:center;
    color:rgba(255,255,255,.82);
    font-size:15px;
    line-height:1.9;
    letter-spacing:1px;
}

/* DOWNLOAD BUTTON */

.download-btn{
    position:relative;
    margin-top:45px;
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:14px;
    padding:22px;
    border-radius:20px;
    text-decoration:none;
    overflow:hidden;

    background:linear-gradient(
        135deg,
        #3b82f6,
        #06b6d4,
        #a855f7
    );

    color:white;
    font-size:18px;
    font-weight:700;
    letter-spacing:1px;

    transition:.25s ease;

    box-shadow:
    0 12px 35px rgba(59,130,246,.35);
}

/* SHINE EFFECT */

.download-btn::before{
    content:"";
    position:absolute;
    top:0;
    left:-120%;
    width:60%;
    height:100%;
    background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.5),
        transparent
    );
    transform:skewX(-20deg);
    animation:shine 2.2s infinite;
}

@keyframes shine{
    100%{
        left:180%;
    }
}

.download-btn:hover{
    transform:scale(1.03);
    box-shadow:
    0 16px 45px rgba(168,85,247,.5);
}

/* ICON */

.icon{
    font-size:22px;
    animation:bounce 1s infinite;
}

@keyframes bounce{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(4px);
    }
}

/* FOOTER */

.footer{
    margin-top:30px;
    text-align:center;
    font-size:13px;
    color:rgba(255,255,255,.60);
    line-height:1.9;

.footer span{

/* DISCORD CONTACT */

.contact{

    border-radius:16px;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.12);
    transition:.25s ease;
}

.contact a:hover{
    transform:translateY(-3px) scale(1.04);
    background:rgba(88,101,242,.18);
    box-shadow:
    0 10px 25px rgba(88,101,242,.35);
}

.contact i{
    font-size:22px;
    color:#5865F2;
}

</style>
